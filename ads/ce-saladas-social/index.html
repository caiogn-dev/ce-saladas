<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Cê Saladas Social Ad</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fdfbf7;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(127, 181, 46, 0.12), transparent 28%),
          linear-gradient(180deg, #fdfbf7 0%, #fff7ed 100%);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="scene-1"
        data-composition-id="scene1-logo-intro"
        data-composition-src="compositions/scene1-logo-intro.html"
        data-start="0"
        data-duration="3"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-2-4"
        data-composition-id="ce-scene-benefits"
        data-composition-src="compositions/ce-scene-benefits.html"
        data-start="3"
        data-duration="10"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-5"
        data-composition-id="ce-scene-cta"
        data-composition-src="compositions/ce-scene-cta.html"
        data-start="13"
        data-duration="2"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      mainTl.to(
        "#scene-1",
        {
          opacity: 0,
          scale: 1.06,
          filter: "blur(18px)",
          duration: 0.3,
          ease: "power2.in",
        },
        2.7,
      );

      mainTl.to(
        "#scene-2-4",
        {
          opacity: 0,
          y: -80,
          scale: 0.96,
          filter: "blur(20px)",
          duration: 0.35,
          ease: "power2.in",
        },
        12.65,
      );

      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
